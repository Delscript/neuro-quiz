<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SierQuiz - Inteligência Neural</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    
    fbq('init', 'SEU_ID_DO_PIXEL_AQUI'); // <--- SEU PIXEL AQUI
    fbq('track', 'PageView');
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; padding: 0; }
        .card-quiz { background: #0f172a; border: 1px solid #1e293b; border-radius: 24px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .opcao-btn { background: #1e293b; border: 1px solid #334155; padding: 16px; border-radius: 16px; width: 100%; text-align: left; margin-bottom: 12px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .opcao-btn:active { background: #3b82f6; border-color: #60a5fa; transform: scale(0.98); }
        .hidden { display: none !important; }
        .barra-progresso { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
        .progresso-fill { height: 100%; background: linear-gradient(to right, #f97316, #ea580c); width: 0%; transition: width 0.3s; }
        
        /* ESTILOS NOVOS DO CRONÔMETRO NEUROMARKETING */
        .barra-tempo-container { height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; margin-bottom: 10px; width: 100%; }
        .tempo-fill { height: 100%; width: 100%; background: #10b981; transition: width 0.1s linear, background-color 0.3s; }
        .tempo-urgente { background: #ef4444; animation: piscarUrgencia 0.5s infinite; }
        @keyframes piscarUrgencia { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #msg-esgotado { color: #ef4444; font-weight: 900; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-shadow: 0px 0px 20px rgba(239,68,68,0.8); z-index: 100;}

        .tela-app { display: none; }
        .tela-app.ativa { display: block; animation: aparecer 0.4s; }
        @keyframes aparecer { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md relative">
        <div id="tela-inicio" class="card-quiz text-center tela-app ativa">
            <h1 class="text-3xl font-black text-orange-500 mb-1 tracking-tighter">Sier<span class="text-blue-500">Quiz</span></h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] mb-8 italic font-semibold text-center">Intelligence Engine v2.0</p>
            <div class="space-y-4">
                <input type="text" id="nome-usuario" placeholder="Nome Completo" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-800 focus:border-orange-500 outline-none text-sm text-white">
                <input type="email" id="email-usuario" placeholder="E-mail" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-800 focus:border-orange-500 outline-none text-sm text-white">
                <input type="tel" id="whatsapp-usuario" placeholder="WhatsApp (DDD)" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-800 focus:border-orange-500 outline-none text-sm text-white">
                <button type="button" onclick="_quizApp.iniciar()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-extrabold text-lg shadow-lg">Iniciar Avaliação</button>
            </div>
        </div>

        <div id="tela-perguntas" class="card-quiz tela-app text-center relative">
            <div class="barra-progresso"><div id="barra-progresso" class="progresso-fill"></div></div>
            
            <div class="barra-tempo-container" id="container-tempo">
                <div id="barra-tempo" class="tempo-fill"></div>
            </div>

            <div class="flex justify-between text-[10px] text-slate-500 font-bold mb-6 uppercase tracking-widest text-center mt-2">
                <span>PERGUNTA <span id="num-pergunta">1</span>/21</span>
                <span class="text-orange-500 italic">SierQuiz</span>
            </div>
            
            <div id="msg-esgotado">TEMPO ESGOTADO!</div>
            
            <h2 id="texto-pergunta" class="text-lg font-bold mb-8 leading-tight text-slate-100 text-center transition-opacity duration-200">...</h2>
            <div id="area-opcoes" class="transition-opacity duration-200"></div>
        </div>

        <div id="tela-carregando" class="card-quiz text-center tela-app">
            <div class="w-12 h-12 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <h2 class="text-lg font-bold">Processando Respostas...</h2>
            <p class="text-xs text-slate-500 mt-2 uppercase tracking-widest">Cruzando métricas neurais</p>
        </div>

        <div id="tela-pagamento" class="card-quiz text-center tela-app">
            <h2 class="text-2xl font-black text-green-500 mb-2 italic uppercase text-center">Análise Pronta!</h2>
            <div id="area-qr" class="bg-white p-6 rounded-[32px] text-black flex flex-col items-center">
                <p class="text-slate-500 font-bold">Conectando ao sistema...</p>
            </div>
            <div class="mt-6 space-y-3">
                <p id="status-pagamento" class="text-[10px] text-blue-500 font-bold uppercase animate-pulse text-center">⏳ Aguardando pagamento da taxa de emissão...</p>
                <button id="btn-hibrido" onclick="_quizApp.acaoHibrida()" class="w-full bg-slate-800 p-4 rounded-2xl font-bold text-blue-400 text-xs border border-slate-700">
                    ...
                </button>
                <button onclick="_quizApp.reiniciarTeste()" class="text-[9px] text-slate-600 uppercase font-bold hover:text-slate-400">Reiniciar Teste</button>
            </div>
        </div>
    </div>

    <script>
        function copyPix(code) {
            try {
                const el = document.createElement('textarea');
                el.value = code;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert('Chave Pix Copiada com sucesso!');
            } catch(e) {
                alert('Erro ao copiar. Selecione o texto manualmente.');
            }
        }

        window.onload = function() {
            try {
                const txidSalvo = localStorage.getItem('neuro_txid_pendente');
                const imgSalva = localStorage.getItem('neuro_pix_img');
                const codeSalvo = localStorage.getItem('neuro_pix_code');

                if (txidSalvo) {
                    _quizApp.mostrarTela('tela-pagamento');
                    _quizApp.configurarBotaoHibrido();
                    
                    if (imgSalva && codeSalvo) {
                        document.getElementById('area-qr').innerHTML = `
                            <img src="${imgSalva}" class="w-48 mx-auto rounded-xl mb-4">
                            <textarea class="w-full text-[9px] text-slate-500 p-2 bg-slate-50 border rounded-lg mb-4 text-center" rows="2" readonly>${codeSalvo}</textarea>
                            <button class="w-full bg-blue-600 text-white py-3 rounded-xl text-xs font-black uppercase" onclick="copyPix('${codeSalvo}')">Copiar Pix</button>
                        `;
                    } else {
                        document.getElementById('area-qr').innerHTML = `<p class="text-slate-400 text-sm font-bold mt-4">Aguardando confirmação do banco...</p>`;
                    }
                    _quizApp.startStatusCheck(txidSalvo); 
                }
            } catch(e) { console.error("Erro no Cache", e); }
        };

        var _quizApp = {
            dados: { nome: '', email: '', whatsapp: '', qi: 0, qe: 0, idx: 0, fase: '' },
            tempoTotal: 15, // TEMPO POR PERGUNTA (EM SEGUNDOS)
            tempoRestante: 15,
            intervaloTempo: null,
            
            banco: [
                { q: "Qual número completa: 2, 4, 8...?", opts: ["16", "12", "10"], type: "QI", c: 0 },
                { q: "Se A > B e B > C, então:", opts: ["A > C", "C > A", "A = C"], type: "QI", c: 0 },
                { q: "O que pesa mais: 1kg chumbo ou algodão?", opts: ["Iguais", "Chumbo", "Algodão"], type: "QI", c: 0 },
                { q: "Complete: A, C, E, G...", opts: ["I", "H", "J"], type: "QI", c: 0 },
                { q: "20% de 500 é:", opts: ["100", "50", "200"], type: "QI", c: 0 },
                { q: "Se ontem fosse amanhã, hoje seria sábado. Hoje é:", opts: ["Sexta", "Domingo", "Segunda"], type: "QI", c: 2 },
                { q: "Médico : Hospital :: Professor : ?", opts: ["Escola", "Aluno", "Giz"], type: "QI", c: 0 },
                { q: "Carro 80km/h em 30min percorre:", opts: ["40km", "80km", "60km"], type: "QI", c: 0 },
                { q: "Qual item não pertence ao grupo?", opts: ["Cadeira", "Banana", "Maçã"], type: "QI", c: 0 },
                { q: "Inovar exige:", opts: ["Resolver uma dor", "Dinheiro", "Sorte"], type: "QI", c: 0 },
                { q: "Se o dia depois de amanhã é terça, que dia foi ontem?", opts: ["Sábado", "Domingo", "Sexta"], type: "QI", c: 0 },
                { q: "Luz está para Olho como Som está para:", opts: ["Ouvido", "Voz", "Eco"], type: "QI", c: 0 },
                { q: "A à esquerda de B. C à direita de B. Quem está no meio?", opts: ["B", "A", "C"], type: "QI", c: 0 },
                { q: "Lógica: 1, 3, 6, 10... Qual o próximo?", opts: ["15", "12", "14"], type: "QI", c: 0 },
                { q: "Cientistas são curiosos. Pedro é cientista. Logo:", opts: ["Pedro é curioso", "Pedro pode ser curioso", "Sem conclusão"], type: "QI", c: 0 },
                { q: "6 maçãs/6 pessoas/6 min. 60 maçãs/60 pessoas levam:", opts: ["6 min", "60 min", "1 min"], type: "QI", c: 0 },
                { q: "Antônimo de 'Explícito'?", opts: ["Tácito", "Claro", "Direto"], type: "QI", c: 0 },
                { q: "Avião cai na fronteira. Onde enterram sobreviventes?", opts: ["Não se enterra vivos", "No Brasil", "Argentina"], type: "QI", c: 0 },
                { q: "Invertendo o número 8102:", opts: ["2018", "2108", "8012"], type: "QI", c: 0 },
                { q: "Pai de Maria tem 5 filhas: Lala, Lele, Lili, Lolo e...?", opts: ["Maria", "Lulu", "Leila"], type: "QI", c: 0 },
                { q: "Sob pressão extrema, você:", opts: ["Foca na solução", "Trava", "Reclama"], type: "QE", c: 0 },
                { q: "Cliente gritou. Sua reação imediata é:", opts: ["Resolve calmamente", "Grita de volta", "Ignora"], type: "QE", c: 0 },
                { q: "Em grupo, você prefere:", opts: ["Liderar", "Seguir", "Fazer só"], type: "QE", c: 0 },
                { q: "Erro na empresa, você:", opts: ["Assume", "Esconde", "Culpa outro"], type: "QE", c: 0 },
                { q: "Feedback duro:", opts: ["Cresce", "Raiva", "Desiste"], type: "QE", c: 0 },
                { q: "Colega triste:", opts: ["Ajuda", "Ignora", "Piada"], type: "QE", c: 0 },
                { q: "Negociação:", opts: ["Ganha-ganha", "Vencer", "Não perder"], type: "QE", c: 0 },
                { q: "Inteligência Emocional:", opts: ["Gerir emoções", "Sempre feliz", "Sem raiva"], type: "QE", c: 0 },
                { q: "Mudança repentina:", opts: ["Adapta", "Reclama", "Trava"], type: "QE", c: 0 },
                { q: "Ao notar colega estressado:", opts: ["Valida o sentimento", "Dá conselho", "Ignora"], type: "QE", c: 0 },
                { q: "Ao receber crítica:", opts: ["Analisa fatos", "Sente-se atacado", "Desmotiva"], type: "QE", c: 0 },
                { q: "Consegue nomear o que sente agora?", opts: ["Sim", "Às vezes", "Não"], type: "QE", c: 0 },
                { q: "Em conflitos de interesse, busca:", opts: ["Equilíbrio", "Defender posição", "Ceder"], type: "QE", c: 0 },
                { q: "Imprevisto destrói o dia:", opts: ["Recalcula rota", "Irrita-se", "Tenta seguir"], type: "QE", c: 0 },
                { q: "Liderança inspiradora exige:", opts: ["Propósito e Valores", "Metas e Pressão", "Controle"], type: "QE", c: 0 },
                { q: "Lê microexpressões no rosto alheio?", opts: ["Sim", "Razoável", "Não"], type: "QE", c: 0 },
                { q: "Erro grave da equipe:", opts: ["Assume responsabilidade", "Busca culpado", "Relata"], type: "QE", c: 0 },
                { q: "Entusiasmo sem resultados rápidos:", opts: ["Sim", "Só com bônus", "Dificuldade"], type: "QE", c: 0 },
                { q: "Discussões calorosas:", opts: ["Pausa para acalmar", "Eleva o tom", "Ignora"], type: "QE", c: 0 },
                { q: "Amigo frustrado:", opts: ["Valida a dor", "Tenta resolver", "Diz para superar"], type: "QE", c: 0 }
            ],

            perguntaFixa: { q: "Para calibrar sua liderança: Qual sua fase atual?", opts: ["Empreendedor/Dono", "Autônomo/Liberal", "CLT/Colaborador", "Estudante/Outros"], type: "SEG", c: 0 },
            perguntas: [],

            prepararQuiz: function() {
                const gQI = this.banco.filter(p => p.type === 'QI').sort(() => Math.random() - 0.5);
                const gQE = this.banco.filter(p => p.type === 'QE').sort(() => Math.random() - 0.5);
                const sel = [...gQI.slice(0, 10), ...gQE.slice(0, 10)].sort(() => Math.random() - 0.5);
                this.perguntas = [...sel, this.perguntaFixa];
            },

            iniciar: function() {
                try {
                    const n = document.getElementById('nome-usuario').value;
                    const e = document.getElementById('email-usuario').value;
                    const w = document.getElementById('whatsapp-usuario').value;
                    if(!n || !e.includes('@') || !w) return alert("Preencha todos os campos corretamente para iniciar!");
                    
                    try { if(window.fbq) fbq('track', 'Lead', { content_name: 'Inicio SierQuiz' }); } catch(err) {}

                    this.dados.nome = n; this.dados.email = e; this.dados.whatsapp = w;
                    this.prepararQuiz();
                    this.mostrarTela('tela-perguntas');
                    this.renderizar();
                } catch (error) {
                    console.error("Erro ao iniciar:", error);
                    alert("Ocorreu um erro no navegador. Recarregue a página.");
                }
            },

            iniciarCronometro: function() {
                clearInterval(this.intervaloTempo);
                this.tempoRestante = this.tempoTotal;
                const barraTempo = document.getElementById('barra-tempo');
                barraTempo.style.width = '100%';
                barraTempo.classList.remove('tempo-urgente');
                
                // Exceção: A última pergunta (Perfil) não precisa de tanta pressão
                if(this.perguntas[this.dados.idx].type === 'SEG') {
                    document.getElementById('container-tempo').style.display = 'none';
                    return;
                } else {
                    document.getElementById('container-tempo').style.display = 'block';
                }

                this.intervaloTempo = setInterval(() => {
                    this.tempoRestante -= 0.1; // Atualiza a cada 100ms para a barra descer suave
                    let porcentagem = (this.tempoRestante / this.tempoTotal) * 100;
                    barraTempo.style.width = `${porcentagem}%`;

                    if (this.tempoRestante <= 5) {
                        barraTempo.classList.add('tempo-urgente');
                    }

                    if (this.tempoRestante <= 0) {
                        clearInterval(this.intervaloTempo);
                        this.punirEsgotamento();
                    }
                }, 100);
            },

            punirEsgotamento: function() {
                // A pessoa travou e não respondeu. Leva 0 pontos.
                document.getElementById('texto-pergunta').style.opacity = '0';
                document.getElementById('area-opcoes').style.opacity = '0';
                document.getElementById('msg-esgotado').style.display = 'block';
                
                setTimeout(() => {
                    document.getElementById('msg-esgotado').style.display = 'none';
                    document.getElementById('texto-pergunta').style.opacity = '1';
                    document.getElementById('area-opcoes').style.opacity = '1';
                    this.dados.idx++; 
                    this.renderizar();
                }, 1500); // Mostra a mensagem por 1.5s e pula a questão
            },

            renderizar: function() {
                if(this.dados.idx >= this.perguntas.length) return this.finalizar();
                
                this.iniciarCronometro(); // Dispara o relógio
                
                const q = this.perguntas[this.dados.idx];
                document.getElementById('num-pergunta').innerText = this.dados.idx + 1;
                document.getElementById('texto-pergunta').innerText = q.q;
                document.getElementById('barra-progresso').style.width = ((this.dados.idx / 21) * 100) + '%';
                const div = document.getElementById('area-opcoes'); div.innerHTML = '';
                q.opts.forEach((opt, i) => {
                    const btn = document.createElement('div'); btn.className = 'opcao-btn'; btn.innerText = opt;
                    btn.onclick = () => {
                        clearInterval(this.intervaloTempo); // Parou o tempo ao clicar!
                        if(q.type === 'SEG') this.dados.fase = opt;
                        else if(i === q.c) q.type === 'QI' ? this.dados.qi++ : this.dados.qe++;
                        this.dados.idx++; this.renderizar();
                    };
                    div.appendChild(btn);
                });
            },

            finalizar: function() { 
                clearInterval(this.intervaloTempo);
                this.mostrarTela('tela-carregando'); 
                setTimeout(() => this.gerarPix(), 2000); 
            },

            configurarBotaoHibrido: function() {
                const btn = document.getElementById('btn-hibrido');
                if (window.AndroidInterface) {
                    btn.innerHTML = 'ASSISTIR VÍDEO (GRÁTIS)';
                } else {
                    btn.innerHTML = '📲 BAIXAR O APP (RESULTADO GRÁTIS)';
                }
            },

            acaoHibrida: function() {
                if (window.AndroidInterface) {
                    if (window.AndroidInterface.showInterstitial) window.AndroidInterface.showInterstitial();
                    else this.liberarRelatorio();
                } else {
                    window.open('https://play.google.com/store/apps/details?id=com.siergrowth.neuroquiz', '_blank');
                }
            },

            gerarPix: async function() {
                try {
                    document.getElementById('area-qr').innerHTML = `<p class="text-slate-500 font-bold">Conectando ao banco...</p>`;
                    this.configurarBotaoHibrido();
                    this.mostrarTela('tela-pagamento');

                    const res = await fetch('/api/pix', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            nome: this.dados.nome, email: this.dados.email, 
                            whatsapp: this.dados.whatsapp, qi: this.dados.qi, 
                            qe: this.dados.qe, fase: this.dados.fase 
                        })
                    });
                    
                    if (!res.ok) throw new Error("Falha na API");
                    const data = await res.json();
                    
                    if(data.txid) {
                        try { if(window.fbq) fbq('track', 'InitiateCheckout', { value: 1.00, currency: 'BRL' }); } catch(err) {}

                        localStorage.setItem('neuro_txid_pendente', data.txid);
                        localStorage.setItem('neuro_nome_pendente', this.dados.nome);
                        localStorage.setItem('neuro_pix_img', data.img);
                        localStorage.setItem('neuro_pix_code', data.code);
                        
                        document.getElementById('area-qr').innerHTML = `
                            <img src="${data.img}" class="w-48 mx-auto rounded-xl mb-4">
                            <textarea class="w-full text-[9px] text-slate-500 p-2 bg-slate-50 border rounded-lg mb-4 text-center" rows="2" readonly>${data.code}</textarea>
                            <button class="w-full bg-blue-600 text-white py-3 rounded-xl text-xs font-black uppercase" onclick="copyPix('${data.code}')">Copiar Pix</button>
                        `;
                        
                        this.startStatusCheck(data.txid);
                    } else {
                        throw new Error("Sem TXID");
                    }
                } catch(e) { 
                    console.error("Erro Pix:", e);
                    document.getElementById('area-qr').innerHTML = `
                        <p class="text-red-500 text-sm font-bold mt-4">Falha de conexão com o Banco.</p>
                        <button onclick="_quizApp.gerarPix()" class="mt-4 bg-slate-800 text-white px-4 py-2 rounded font-bold border border-slate-600">🔄 Tentar Novamente</button>
                    `;
                }
            },

            startStatusCheck: function(txid) {
                if (window.loopVerificacao) clearInterval(window.loopVerificacao);
                window.loopVerificacao = setInterval(async () => {
                    try {
                        const res = await fetch('/api/status?txid=' + txid);
                        const json = await res.json();
                        if (json.status === 'pago') {
                            clearInterval(window.loopVerificacao);
                            this.limparCachePagamento();
                            window.location.href = `resultado-teste.html?txid=${txid}&nome=${encodeURIComponent(this.dados.nome)}&qi=${this.dados.qi}&qe=${this.dados.qe}&fase=${encodeURIComponent(this.dados.fase)}`;
                        }
                    } catch (e) {}
                }, 3000);
            },

            onAdDismissed: function() { this.liberarRelatorio(); },

            liberarRelatorio: function() {
                this.limparCachePagamento();
                const link = `resultado-teste.html?txid=FREE&nome=${encodeURIComponent(this.dados.nome)}&qi=${this.dados.qi}&qe=${this.dados.qe}&fase=${encodeURIComponent(this.dados.fase)}`;
                window.location.href = link;
            },

            limparCachePagamento: function() {
                localStorage.removeItem('neuro_txid_pendente');
                localStorage.removeItem('neuro_nome_pendente');
                localStorage.removeItem('neuro_pix_img');
                localStorage.removeItem('neuro_pix_code');
            },

            reiniciarTeste: function() {
                this.limparCachePagamento();
                location.reload();
            },

            mostrarTela: function(id) {
                document.querySelectorAll('.tela-app').forEach(el => el.classList.remove('ativa'));
                document.getElementById(id).classList.add('ativa');
            }
        };
    </script>
</body>
</html>
