<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sier Growth - Neuro Quiz</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>

        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; padding: 0; }

        .card-quiz { background: #0f172a; border: 1px solid #1e293b; border-radius: 24px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        .opcao-btn { background: #1e293b; border: 1px solid #334155; padding: 16px; border-radius: 16px; width: 100%; text-align: left; margin-bottom: 12px; font-weight: 500; cursor: pointer; transition: 0.2s; }

        .opcao-btn:active { background: #3b82f6; border-color: #60a5fa; transform: scale(0.98); }

        .hidden { display: none !important; }

        .barra-progresso { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; margin-bottom: 20px; }

        .progresso-fill { height: 100%; background: linear-gradient(to right, #f97316, #ea580c); width: 0%; transition: width 0.3s; }

        .tela-app { display: none; }

        .tela-app.ativa { display: block; animation: aparecer 0.4s; }

        @keyframes aparecer { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>

</head>

<body class="min-h-screen flex items-center justify-center p-4">



    <div class="w-full max-w-md">

        <div id="tela-inicio" class="card-quiz text-center tela-app ativa">

            <h1 class="text-2xl font-black text-orange-500 mb-1 uppercase tracking-tighter">Sier Growth</h1>

            <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] mb-8 italic font-semibold text-center">Intelligence Engine v2.0</p>

            <div class="space-y-4">

                <input type="text" id="nome-usuario" placeholder="Nome Completo" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-800 focus:border-orange-500 outline-none text-sm text-white">

                <input type="email" id="email-usuario" placeholder="E-mail" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-800 focus:border-orange-500 outline-none text-sm text-white">

                <input type="tel" id="whatsapp-usuario" placeholder="WhatsApp (DDD)" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-800 focus:border-orange-500 outline-none text-sm text-white">

                <button type="button" onclick="_quizApp.iniciar()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-extrabold text-lg shadow-lg">Iniciar Avaliação</button>

            </div>

        </div>



        <div id="tela-perguntas" class="card-quiz tela-app text-center">

            <div class="barra-fundo mb-4"><div id="barra-progresso" class="progresso-fill"></div></div>

            <div class="flex justify-between text-[10px] text-slate-500 font-bold mb-6 uppercase tracking-widest text-center">

                <span>PERGUNTA <span id="num-pergunta">1</span>/20</span>

                <span class="text-orange-500 italic">Neuro-Análise</span>

            </div>

            <h2 id="texto-pergunta" class="text-lg font-bold mb-8 leading-tight text-slate-100 text-center">...</h2>

            <div id="area-opcoes"></div>

        </div>



        <div id="tela-carregando" class="card-quiz text-center tela-app">

            <div class="w-12 h-12 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>

            <h2 class="text-lg font-bold">Processando Respostas...</h2>

            <p class="text-xs text-slate-500 mt-2 uppercase tracking-widest">Cruzando métricas neurais</p>

        </div>



        <div id="tela-pagamento" class="card-quiz text-center tela-app">

            <h2 class="text-2xl font-black text-green-500 mb-2 italic uppercase text-center">Análise Pronta!</h2>

            <p class="text-slate-400 text-sm mb-8 text-center">Escaneie o Pix para liberar seu relatório:</p>

            <div id="area-qr" class="bg-white p-6 rounded-[32px] text-black flex flex-col items-center">

                Gerando Pix Seguro...

            </div>

            <div class="mt-6 space-y-3">

                <p id="status-pagamento" class="text-[10px] text-blue-500 font-bold uppercase animate-pulse text-center">⏳ Aguardando pagamento...</p>

                <button onclick="_quizApp.verAnuncio()" class="w-full bg-slate-800 p-4 rounded-2xl font-bold text-blue-400 text-xs border border-slate-700">ASSISTIR VÍDEO (GRÁTIS)</button>

                <button onclick="localStorage.clear(); location.reload();" class="text-[9px] text-slate-600 uppercase font-bold hover:text-slate-400">Reiniciar Teste</button>

            </div>

        </div>

    </div>



    <script>

        window.onload = () => {

            const txid = localStorage.getItem('neuro_txid_pendente');

            const nome = localStorage.getItem('neuro_nome_pendente');

            if (txid && nome) {

                _quizApp.dados.nome = nome;

                _quizApp.mostrarTela('tela-pagamento');

                // Em vez de "Recuperando", ele chama a API de novo para garantir o visual do QR

                _quizApp.gerarPix(); 

            }

        };


var _quizApp = {
        dados: { nome: '', email: '', whatsapp: '', qi: 0, qe: 0, idx: 0, fase: '' },
        
        // BANCO COM 40 PERGUNTAS DE NOTA (20 QI + 20 QE)
        banco: [
            // --- 20 PERGUNTAS DE QI ---
            { q: "Qual número completa: 2, 4, 8...?", opts: ["16", "12", "10"], type: "QI", c: 0 },
            { q: "Se A > B e B > C, então:", opts: ["A > C", "C > A", "A = C"], type: "QI", c: 0 },
            { q: "O que pesa mais: 1kg chumbo ou algodão?", opts: ["Iguais", "Chumbo", "Algodão"], type: "QI", c: 0 },
            { q: "Complete: A, C, E, G...", opts: ["I", "H", "J"], type: "QI", c: 0 },
            { q: "20% de 500 é:", opts: ["100", "50", "200"], type: "QI", c: 0 },
            { q: "Se ontem fosse amanhã, hoje seria sábado. Hoje é:", opts: ["Sexta", "Domingo", "Segunda"], type: "QI", c: 2 },
            { q: "Médico : Hospital :: Professor : ?", opts: ["Escola", "Aluno", "Giz"], type: "QI", c: 0 },
            { q: "Carro 80km/h em 30min percorre:", opts: ["40km", "80km", "60km"], type: "QI", c: 0 },
            { q: "Qual item não pertence ao grupo?", opts: ["Cadeira", "Banana", "Maçã"], type: "QI", c: 0 },
            { q: "Inovar com eficiência exige:", opts: ["Resolver uma dor", "Dinheiro", "Sorte"], type: "QI", c: 0 },
            { q: "Se o dia depois de amanhã é terça, que dia foi ontem?", opts: ["Sábado", "Domingo", "Sexta"], type: "QI", c: 0 },
            { q: "Luz está para Olho como Som está para:", opts: ["Ouvido", "Voz", "Eco"], type: "QI", c: 0 },
            { q: "A à esquerda de B. C à direita de B. Quem está no meio?", opts: ["B", "A", "C"], type: "QI", c: 0 },
            { q: "Lógica: 1, 3, 6, 10... Qual o próximo?", opts: ["15", "12", "14"], type: "QI", c: 0 },
            { q: "Todos os cientistas são curiosos. Pedro é cientista. Logo:", opts: ["Pedro é curioso", "Pedro pode ser curioso", "Sem conclusão"], type: "QI", c: 0 },
            { q: "6 maçãs/6 pessoas/6 min. 60 maçãs/60 pessoas levam:", opts: ["6 minutos", "60 minutos", "1 minuto"], type: "QI", c: 0 },
            { q: "Qual o antônimo da palavra 'Explícito'?", opts: ["Tácito", "Claro", "Direto"], type: "QI", c: 0 },
            { q: "Avião cai na fronteira. Onde enterram os sobreviventes?", opts: ["Não se enterra sobreviventes", "No Brasil", "Argentina"], type: "QI", c: 0 },
            { q: "Invertendo o número 8102, temos:", opts: ["2018", "2108", "8012"], type: "QI", c: 0 },
            { q: "Pai de Maria tem 5 filhas: Lala, Lele, Lili, Lolo e...?", opts: ["Maria", "Lulu", "Leila"], type: "QI", c: 0 },

            // --- 20 PERGUNTAS DE QE ---
            { q: "Sob pressão extrema, você:", opts: ["Foca na solução", "Trava", "Reclama"], type: "QE", c: 0 },
            { q: "Cliente gritou. Sua reação imediata é:", opts: ["Resolve calmamente", "Grita de volta", "Ignora"], type: "QE", c: 0 },
            { q: "Em um trabalho de grupo, você prefere:", opts: ["Liderar", "Seguir instruções", "Fazer sozinho"], type: "QE", c: 0 },
            { q: "Ao cometer um erro na empresa, você:", opts: ["Assume o erro", "Tenta esconder", "Culpa as circunstâncias"], type: "QE", c: 0 },
            { q: "Como você reage a um feedback negativo duro?", opts: ["Usa para crescer", "Fica com raiva", "Pensa em desistir"], type: "QE", c: 0 },
            { q: "Ao ver um colega visivelmente triste, você:", opts: ["Oferece ajuda", "Ignora para não incomodar", "Faz uma piada"], type: "QE", c: 0 },
            { q: "Em uma negociação difícil, seu foco é:", opts: ["Acordo ganha-ganha", "Vencer a qualquer custo", "Não sair perdendo"], type: "QE", c: 0 },
            { q: "Para você, Inteligência Emocional significa:", opts: ["Gerir as próprias emoções", "Estar sempre feliz", "Não sentir raiva"], type: "QE", c: 0 },
            { q: "Diante de uma mudança repentina de planos, você:", opts: ["Adapta-se rápido", "Reclama do processo", "Sente-se paralisado"], type: "QE", c: 0 },
            { q: "Ao notar um colega sob forte estresse, sua atitude é:", opts: ["Ouvir e validar o sentimento", "Dar um conselho técnico", "Focar apenas no seu trabalho"], type: "QE", c: 0 },
            { q: "Ao receber uma crítica sobre um projeto pessoal querido:", opts: ["Analisa fatos para melhorar", "Sente-se atacado pessoalmente", "Desmotiva-se"], type: "QE", c: 0 },
            { q: "Sua facilidade em identificar o que sente agora é:", opts: ["Alta: Sei nomear a emoção", "Média: Às vezes me confundo", "Baixa: Apenas sinto mal-estar"], type: "QE", c: 0 },
            { q: "Em negociações com interesses opostos, você busca:", opts: ["Equilíbrio benéfico mútuo", "Defender sua posição", "Ceder para evitar conflito"], type: "QE", c: 0 },
            { q: "Se um imprevisto destrói seu planejamento do dia:", opts: ["Recalcula a rota e prioriza", "Fica irritado e perde ritmo", "Tenta seguir o plano antigo"], type: "QE", c: 0 },
            { q: "Acredita que a liderança inspiradora vem de:", opts: ["Propósito e Valores", "Metas e Pressão", "Controle e Instrução"], type: "QE", c: 0 },
            { q: "Consegue ler microexpressões no rosto das pessoas?", opts: ["Sim, percebo detalhes", "Razoável", "Não, foco nas palavras"], type: "QE", c: 0 },
            { q: "Diante de um erro grave da equipe, você:", opts: ["Assume a responsabilidade", "Identifica o culpado", "Relata ao superior"], type: "QE", c: 0 },
            { q: "Mantém o entusiasmo sem resultados imediatos?", opts: ["Sim, foco no longo prazo", "Só se houver incentivos", "Tenho muita dificuldade"], type: "QE", c: 0 },
            { q: "Em uma discussão calorosa, você costuma:", opts: ["Pausar para acalmar os ânimos", "Elevar o tom para ser ouvido", "Retirar-se e ignorar"], type: "QE", c: 0 },
            { q: "Se um amigo está frustrado, você costuma:", opts: ["Validar a dor dele", "Tentar resolver o problema", "Dizer para ele superar"], type: "QE", c: 0 }
        ],

        perguntaFixa: { q: "Para calibrar sua liderança: Qual sua fase atual?", opts: ["Empreendedor/Dono", "Autônomo/Liberal", "CLT/Colaborador", "Estudante/Outros"], type: "SEG", c: 0 },
        perguntas: [],

        prepararQuiz: function() {
            // Lógica Infalível: 10 de cada lado do banco de 20
            const grupoQI = this.banco.filter(p => p.type === 'QI');
            const grupoQE = this.banco.filter(p => p.type === 'QE');

            // Embaralha as 20 de cada grupo
            grupoQI.sort(() => Math.random() - 0.5);
            grupoQE.sort(() => Math.random() - 0.5);

            // Pega exatamente 10 de cada
            const selecionadasQI = grupoQI.slice(0, 10);
            const selecionadasQE = grupoQE.slice(0, 10);

            // Mistura as 20 selecionadas para o usuário
            let mix = [...selecionadasQI, ...selecionadasQE].sort(() => Math.random() - 0.5);

            // Adiciona a de segmentação como a 21ª questão
            this.perguntas = [...mix, this.perguntaFixa];
        },

        iniciar: () => {
            const n = document.getElementById('nome-usuario').value;
            const e = document.getElementById('email-usuario').value;
            const w = document.getElementById('whatsapp-usuario').value;
            if(!n || !e.includes('@') || !w) return alert("Preencha todos os campos corretamente!");
            
            _quizApp.dados.nome = n; _quizApp.dados.email = e; _quizApp.dados.whatsapp = w;
            _quizApp.prepararQuiz();
            _quizApp.mostrarTela('tela-perguntas');
            _quizApp.renderizar();
        },

        renderizar: () => {
            if(_quizApp.dados.idx >= _quizApp.perguntas.length) return _quizApp.finalizar();
            const q = _quizApp.perguntas[_quizApp.dados.idx];
            document.getElementById('num-pergunta').innerText = _quizApp.dados.idx + 1;
            document.getElementById('texto-pergunta').innerText = q.q;
            
            // Barra de progresso baseada em 21 questões agora
            document.getElementById('barra-progresso').style.width = ((_quizApp.dados.idx / 21) * 100) + '%';
            
            const div = document.getElementById('area-opcoes');
            div.innerHTML = '';
            q.opts.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'opcao-btn'; btn.innerText = opt;
                btn.onclick = () => {
                    if(q.type === 'SEG') _quizApp.dados.fase = opt;
                    else if(i === q.c) q.type === 'QI' ? _quizApp.dados.qi++ : _quizApp.dados.qe++;
                    _quizApp.dados.idx++; _quizApp.renderizar();
                };
                div.appendChild(btn);
            });
        },

        finalizar: async () => {
            _quizApp.mostrarTela('tela-carregando');
            const txid = 'TX-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            
            await supabase.from('leads').insert([{
                nome: _quizApp.dados.nome, email: _quizApp.dados.email, whatsapp: _quizApp.dados.whatsapp,
                qi_score: _quizApp.dados.qi, qe_score: _quizApp.dados.qe, txid: txid, status_pagamento: 'pendente'
            }]);

            _quizApp.mostrarTela('tela-pagamento');
            _quizApp.gerarPixManual(txid);
        },

        // Métodos de Pix, Radar e AdMob mantidos...
        verAnuncio: () => {
            if (window.AndroidInterface) {
                window.AndroidInterface.showInterstitial(); 
            } else {
                _quizApp.liberarRelatorio();
            }
        },
        liberarRelatorio: () => {
            window.location.href = `resultado-teste.html?txid=FREE&nome=${encodeURIComponent(_quizApp.dados.nome)}&qi=${_quizApp.dados.qi}&qe=${_quizApp.dados.qe}&fase=${encodeURIComponent(_quizApp.dados.fase)}`;
        }
        // ... (resto do objeto _quizApp igual ao anterior)
    };
</script>
</body>

</html>
