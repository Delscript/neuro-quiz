<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SierQuiz - Resultado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; margin: 0; padding: 0; }
        
        /* Container com 2cm de margem lateral no desktop */
        .page-container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 120px; /* Espaço para o botão flutuante não cobrir nada */
        }

        #relatorio {
            background-color: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .assinatura { font-family: 'Allura', cursive; font-size: 1.4rem; color: #1e3a8a; }
        
        /* Botão Flutuante Fixado no Rodapé do Aparelho */
        .btn-flutuante {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 999;
        }

        .barra-fundo { background: #e2e8f0; height: 12px; border-radius: 6px; width: 100%; margin-top: 8px; }
        .barra-fill { height: 100%; border-radius: 6px; transition: width 1.5s ease-in-out; }
    </style>
</head>
<body>

    <div class="page-container">
        <div id="relatorio">
            <div class="flex justify-between items-start mb-6 border-b pb-4">
                <div>
                    <h1 class="text-xl font-black text-orange-600 tracking-tighter text-left">SIER<span class="text-blue-600">QUIZ</span></h1>
                    <div class="text-[8px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold uppercase inline-block">ID Autêntico: <span id="res-id"></span></div>
                </div>
                <div class="text-right text-[10px] text-slate-400 font-bold" id="data-hoje"></div>
            </div>

            <div class="text-center mb-6">
                <h2 id="titulo-perfil" class="text-2xl font-black text-slate-800 uppercase leading-none"></h2>
                <p id="subtitulo-perfil" class="text-xs text-blue-600 font-bold italic mt-1"></p>
            </div>

            <div class="space-y-4 mb-6">
                <div>
                    <div class="flex justify-between text-[10px] font-bold uppercase text-slate-500"><span>Razão (QI)</span><span id="val-qi">0</span></div>
                    <div class="barra-fundo"><div id="barra-qi" class="barra-fill bg-blue-600" style="width: 0%"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-[10px] font-bold uppercase text-slate-500"><span>Emoção (QE)</span><span id="val-qe">0</span></div>
                    <div class="barra-fundo"><div id="barra-qe" class="barra-fill bg-orange-500" style="width: 0%"></div></div>
                </div>
            </div>

            <div class="space-y-4 text-slate-700">
                <div>
                    <h3 class="text-[9px] font-black text-slate-400 uppercase">Diagnóstico</h3>
                    <p id="txt1" class="text-xs leading-relaxed text-justify"></p>
                </div>
                <div class="bg-orange-50 p-3 rounded-lg border-l-4 border-orange-500">
                    <h3 class="text-[9px] font-black text-orange-600 uppercase">Ponto Cego</h3>
                    <p id="txt2" class="text-xs italic font-medium"></p>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t flex justify-between items-end">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Análise para:</p>
                    <p id="nome-cliente" class="text-sm font-black text-slate-900 uppercase"></p>
                </div>
                <div class="text-right">
                    <div class="assinatura">Anderson Dias</div>
                    <p class="text-[7px] font-bold text-slate-400 uppercase">Especialista Sier Growth</p>
                </div>
            </div>
        </div>
    </div>

    <div class="btn-flutuante">
        <button onclick="irParaZap()" class="w-full bg-green-600 text-white p-4 rounded-2xl shadow-2xl flex flex-col items-center justify-center hover:bg-green-500 transition-all active:scale-95">
            <span class="text-[10px] font-bold opacity-80 uppercase tracking-widest">1. Tire o Print da Tela</span>
            <span class="text-sm font-black uppercase tracking-tighter">2. Enviar para o Especialista</span>
        </button>
        <p class="text-center text-[9px] text-slate-400 mt-2 font-bold uppercase tracking-widest">SierQuiz v2.0 - Tecnologia Sier Growth</p>
    </div>

    <script>
        window.onload = function() {
            const p = new URLSearchParams(window.location.search);
            const nome = p.get('nome') || "Líder";
            const qi = parseInt(p.get('qi')) || 0;
            const qe = parseInt(p.get('qe')) || 0;
            const txid = p.get('txid') || Math.random().toString(36).substr(2, 7).toUpperCase();

            document.getElementById('res-id').innerText = txid;
            document.getElementById('data-hoje').innerText = new Date().toLocaleDateString();
            document.getElementById('nome-cliente').innerText = nome;
            document.getElementById('val-qi').innerText = qi;
            document.getElementById('val-qe').innerText = qe;

            // Perfis rápidos
            let t, s, d, c;
            if(qi >= 7 && qe >= 7) { t="Alfa Visionário"; s="Alta Performance Híbrida"; d="Você equilibra lógica de mercado com inteligência emocional."; c="Cuidado para não centralizar demais por acreditar que ninguém faz como você."; }
            else if(qi >= 7) { t="Estrategista Técnico"; s="Lógica e Pragmatismo"; d="Sua tomada de decisão é baseada em dados frios e processos."; c="Atenção ao clima da equipe: nem tudo se resolve com planilhas."; }
            else { t="Líder Influenciador"; s="Conexão e Engajamento"; d="Sua força está em mover pessoas e criar redes de confiança."; c="Cuidado com a gestão financeira e métricas de lucro real."; }

            document.getElementById('titulo-perfil').innerText = t;
            document.getElementById('subtitulo-perfil').innerText = s;
            document.getElementById('txt1').innerText = d;
            document.getElementById('txt2').innerText = c;

            setTimeout(() => {
                document.getElementById('barra-qi').style.width = (qi*10)+'%';
                document.getElementById('barra-qe').style.width = (qe*10)+'%';
            }, 300);
        };

        function irParaZap() {
            const msg = encodeURIComponent(`Olá! Concluí o SierQuiz. Segue o print do meu resultado para análise!`);
            window.location.href = `https://wa.me/5571984420194?text=${msg}`;
        }
    </script>
</body>
</html>
