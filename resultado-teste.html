<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SierQuiz - Resultado Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #121212; margin: 0; padding: 0; }
        
        /* Layout Híbrido: 2cm na Web, Ajustado no App */
        .page-container {
            padding-left: 2cm;
            padding-right: 2cm;
            max-width: 800px;
            margin: 0 auto;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        @media (max-width: 640px) {
            .page-container { padding-left: 15px; padding-right: 15px; }
        }

        #relatorio {
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .watermark {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 5rem; font-weight: 900;
            color: rgba(0, 0, 0, 0.03);
            pointer-events: none; z-index: 0;
        }

        .assinatura { font-family: 'Allura', cursive; font-size: 1.4rem; color: #1e3a8a; }
        .barra-fundo { background: #f1f5f9; height: 5px; border-radius: 3px; width: 100%; margin-top: 3px; }
        .barra-fill { height: 100%; border-radius: 3px; transition: width 1.5s ease-in-out; }

        #container-dinamico { width: 100%; max-width: 400px; margin: 0 auto; z-index: 999; }
    </style>
</head>
<body>

    <div class="page-container">
        <div id="relatorio">
            <div class="watermark">SIERQUIZ</div>

            <div style="position: relative; z-index: 10;">
                <div class="flex justify-between items-start">
                    <div>
                        <h1 class="text-xl font-black text-orange-600 tracking-tighter leading-none">SIER<span class="text-blue-600">QUIZ</span></h1>
                        <p class="text-[8px] font-black text-green-600 uppercase tracking-widest mt-1 leading-none">VALIDADO SOB PRESSÃO COGNITIVA</p>
                    </div>
                    <div class="text-right text-[9px] text-slate-400 font-bold" id="data-hoje"></div>
                </div>

                <div class="text-center mb-4 mt-6">
                    <p class="text-[8px] text-blue-500 font-black uppercase tracking-widest mb-1 leading-none text-center">Análise de Perfil e Estratégia</p>
                    <h2 id="titulo-perfil" class="text-2xl font-black text-slate-800 uppercase leading-none tracking-tighter text-center"></h2>
                    <p id="subtitulo-perfil" class="text-xs text-slate-400 font-bold italic text-center"></p>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-slate-50/50 p-3 rounded-xl border border-slate-100">
                        <div class="flex justify-between text-[9px] font-black uppercase text-slate-400"><span>Razão (QI)</span><span id="val-qi" class="text-blue-600 text-[12px]">0</span></div>
                        <div class="barra-fundo"><div id="barra-qi" class="barra-fill bg-blue-600"></div></div>
                    </div>
                    <div class="bg-slate-50/50 p-3 rounded-xl border border-slate-100">
                        <div class="flex justify-between text-[9px] font-black uppercase text-slate-400"><span>Emoção (QE)</span><span id="val-qe" class="text-orange-500 text-[12px]">0</span></div>
                        <div class="barra-fundo"><div id="barra-qe" class="barra-fill bg-orange-500"></div></div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <h3 class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Diagnóstico</h3>
                        <p id="txt-diag" class="text-[11px] leading-tight text-slate-600 text-justify"></p>
                    </div>
                    <div class="bg-blue-50/50 p-3 rounded-lg border-l-2 border-blue-400">
                        <h3 class="text-[9px] font-black text-blue-600 uppercase tracking-wider">Direção Estratégica</h3>
                        <p id="txt-estr" class="text-[11px] leading-tight text-slate-600"></p>
                    </div>
                    <div class="bg-orange-50/50 p-3 rounded-lg border-l-2 border-orange-400">
                        <h3 class="text-[9px] font-black text-orange-600 uppercase tracking-wider">Ponto Cego</h3>
                        <p id="txt-cego" class="text-[11px] font-bold italic text-slate-700"></p>
                    </div>

                    <div class="mt-4 p-3 bg-slate-900 rounded-xl text-center shadow-lg border border-slate-700">
                        <h3 class="text-[8px] font-black text-orange-500 uppercase tracking-widest mb-1">💡 Insight de Superação</h3>
                        <p id="txt-insight" class="text-[10px] text-white italic leading-tight"></p>
                    </div>
                </div>

                <div class="mt-8 pt-4 border-t border-slate-100 flex justify-between items-end">
                    <div class="flex flex-col">
                        <p class="text-[9px] font-black text-slate-300 uppercase mb-3 leading-none text-left">ID: <span id="res-id" class="text-slate-400"></span></p>
                        <p class="text-[9px] font-bold text-slate-400 uppercase leading-none text-left">Análise para:</p>
                        <p id="nome-cliente" class="text-sm font-black text-slate-900 uppercase tracking-tighter text-left"></p>
                    </div>
                    <div class="text-right">
                        <div class="assinatura leading-none">Anderson Dias</div>
                        <p class="text-[7px] font-black text-slate-400 uppercase tracking-widest leading-none">Especialista Sier Growth</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="container-dinamico"></div>

        <div class="text-center mt-6 mb-10">
            <button onclick="reiniciarNovoTeste()" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest hover:text-orange-500 transition-colors">
                🔄 Refazer Análise
            </button>
        </div>
    </div>

    <script>
        window.onload = function() {
            const p = new URLSearchParams(window.location.search);
            const nome = p.get('nome') || "Líder";
            const qi = parseInt(p.get('qi')) || 0;
            const qe = parseInt(p.get('qe')) || 0;
            const txid = p.get('txid') || "6AEFAF"+Math.random().toString(36).substr(2, 6).toUpperCase();

            document.getElementById('res-id').innerText = txid;
            document.getElementById('data-hoje').innerText = new Date().toLocaleDateString();
            document.getElementById('nome-cliente').innerText = nome;
            document.getElementById('val-qi').innerText = qi;
            document.getElementById('val-qe').innerText = qe;

            // LÓGICA DE PERFIS COMPLETA
            let t, s, d, r, p_cego, m;

            if (qi >= 8 && qe >= 8) {
                t = "Mente Visionária (Alfa)"; s = "Equilíbrio raro de alta performance.";
                d = "Você processa dados complexos com precisão e lidera pessoas com empatia.";
                r = "Foque em escala. Você não deve mais executar, mas sim projetar o futuro.";
                p_cego = "Sua visão acelerada pode isolar você.";
                m = "Sua mente é um acelerador de futuros. Lidere com o coração, mas decida com os dados.";
            } else if (qi >= 8 && qe >= 5) {
                t = "Estrategista de Precisão"; s = "Lógica dominante e pragmatismo.";
                d = "Sua mente detecta falhas em processos antes de qualquer um.";
                r = "Delegue a gestão de pessoas e foque no produto.";
                p_cego = "Sua impaciência pode desgastar a cultura da equipe.";
                m = "Sua clareza é uma arma competitiva. O feito é melhor que o perfeito.";
            } else if (qi >= 8) {
                t = "Analista de Elite"; s = "Mestre técnico de alta profundidade.";
                d = "Você resolve o que ninguém mais consegue.";
                r = "Associe-se a pessoas que dominam a venda.";
                p_cego = "Dificuldade em expressar emoções.";
                m = "A profundidade do seu conhecimento move montanhas.";
            } else if (qe >= 8 && qi >= 5) {
                t = "Líder Inspirador"; s = "Foco total no capital humano.";
                d = "Você extrai o melhor de cada pessoa.";
                r = "Ancore suas decisões em números.";
                p_cego = "Tendência a evitar conflitos necessários.";
                m = "O verdadeiro líder é o que faz todos crescerem.";
            } else if (qe >= 8) {
                t = "Diplomata Empático"; s = "Percepção social e vendas aguçadas.";
                d = "Você lê ambientes como ninguém.";
                r = "Estude análise financeira.";
                p_cego = "Risco de se perder em muitas conexões.";
                m = "Seu talento social abre portas que o dinheiro não compra.";
            } else if (qi >= 5 && qe >= 5) {
                t = "Profissional Polivalente"; s = "Estabilidade e versatilidade.";
                d = "Confiável e adaptável.";
                r = "Escolha um pilar para ser mestre.";
                p_cego = "Risco de estagnação.";
                m = "Sua versatilidade é sua força, mas o foco é seu poder.";
            } else {
                t = "Perfil em Transição"; s = "Fase de reestruturação mental.";
                d = "Suas métricas indicam busca por um novo método.";
                r = "Escolha UMA habilidade lógica para dominar.";
                p_cego = "Falta de foco claro.";
                m = "A transição é o berço da evolução.";
            }

            document.getElementById('titulo-perfil').innerText = t;
            document.getElementById('subtitulo-perfil').innerText = s;
            document.getElementById('txt-diag').innerText = d;
            document.getElementById('txt-estr').innerText = r;
            document.getElementById('txt-cego').innerText = p_cego;
            document.getElementById('txt-insight').innerText = m;

            setTimeout(() => {
                document.getElementById('barra-qi').style.width = (qi*10)+'%';
                document.getElementById('barra-qe').style.width = (qe*10)+'%';
            }, 300);

            // DETECÇÃO E AJUSTE WEB VS APP
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const container = document.getElementById('container-dinamico');
            const page = document.querySelector('.page-container');

            if (isMobile) {
                container.className = "mt-4";
                container.innerHTML = `
                    <button onclick="irParaZap()" class="w-full bg-green-600 text-white p-4 rounded-2xl shadow-xl flex flex-col items-center justify-center active:scale-95 transition-transform">
                        <span class="text-[10px] font-bold opacity-80 uppercase tracking-widest mb-1">1. Tire o Print agora</span>
                        <span class="text-sm font-black uppercase tracking-tight">2. Enviar para o Especialista</span>
                    </button>
                `;
                page.style.paddingBottom = "20px";
            } else {
                container.style.position = "fixed";
                container.style.bottom = "20px";
                container.style.left = "50%";
                container.style.transform = "translateX(-50%)";
                container.innerHTML = `
                    <button onclick="irParaZap()" class="w-full bg-green-600 text-white p-4 rounded-2xl shadow-2xl flex flex-col items-center justify-center hover:bg-green-500 transition-all">
                        <span class="text-[10px] font-bold opacity-80 uppercase tracking-widest mb-1">📸 Guarde seu resultado</span>
                        <span class="text-sm font-black uppercase tracking-tight">Enviar no WhatsApp do Especialista</span>
                    </button>
                `;
                page.style.paddingBottom = "120px";
            }
        };

        function irParaZap() {
            const msg = encodeURIComponent(`Olá! Concluí o SierQuiz. Segue o print do meu resultado para análise!`);
            window.location.href = `https://wa.me/5571984420194?text=${msg}`;
        }

        function reiniciarNovoTeste() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'index-teste.html'; 
        }
    </script>
</body>
</html>
