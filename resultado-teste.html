      function gerarPDF() {
    const btnArea = document.getElementById('btn-area');
    btnArea.classList.add('hidden');
    
    const elemento = document.getElementById("relatorio");
    const nomeArquivo = `Relatorio_Sier_${document.getElementById('nome-cliente').innerText.split(' ')[0]}.pdf`;

    const opt = {
        margin: 0,
        filename: nomeArquivo,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    // Gera o PDF
    html2pdf().set(opt).from(elemento).toPdf().output('bloburl').then(function(blobUrl) {
        if (window.AndroidInterface) {
            // No App, abrimos o BlobUrl. Com o DownloadListener que você colocou no Java, 
            // o celular vai entender que deve baixar o arquivo.
            window.location.href = blobUrl;
        } else {
            // No Desktop, continua salvando direto
            html2pdf().set(opt).from(elemento).save();
        }
        btnArea.classList.remove('hidden');
    });
}
    // LÓGICA PARA SMARTPHONE (WEBVIEW) VS DESKTOP
    if (window.AndroidInterface) {
        // No App, geramos o PDF e abrimos em uma nova aba para o sistema baixar
        html2pdf().set(opt).from(elemento).outputPdf('bloburl').then(function(blobUrl) {
            window.open(blobUrl, '_blank');
            btnArea.classList.remove('hidden');
        });
    } else {
        // No Desktop, segue o download direto corrigindo a página extra
        html2pdf().set(opt).from(elemento).toPdf().get('pdf').then(function(pdf) {
            const totalPages = pdf.internal.getNumberOfPages();
            if (totalPages > 1) {
                pdf.deletePage(totalPages); // Remove a página em branco no final
            }
        }).save().then(() => {
            btnArea.classList.remove('hidden');
        });
    }
}
