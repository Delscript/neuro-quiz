<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SierQuiz - Resultado Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #121212; margin: 0; padding: 0; overflow: hidden; }
        
        /* Ajuste das margens de 2cm e controle de altura */
        .page-container {
            padding-left: 2cm;
            padding-right: 2cm;
            max-width: 800px;
            margin: 0 auto;
            padding-top: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        @media (max-width: 640px) {
            .page-container { padding-left: 10px; padding-right: 10px; padding-top: 5px; }
        }

        #relatorio {
            background-color: white;
            border-radius: 20px;
            padding: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0; /* Impede o card de espremer */
        }

        .watermark {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 5rem; font-weight: 900;
            color: rgba(0, 0, 0, 0.03);
            pointer-events: none; z-index: 0;
        }

        .assinatura { font-family: 'Allura', cursive; font-size: 1.3rem; color: #1e3a8a; }
        .barra-fundo { background: #f1f5f9; height: 5px; border-radius: 3px; width: 100%; margin-top: 3px; }
        .barra-fill { height: 100%; border-radius: 3px; transition: width 1.5s ease-in-out; }

        /* ✅ BOTÃO AJUSTADO PARA SUBIR E NÃO SUMIR ✅ */
        .area-botoes {
            margin-top: 10px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="page-container">
        <div id="relatorio">
            <div class="watermark">SIERQUIZ</div>

            <div style="position: relative; z-index: 10;">
                <div class="flex justify-between items-start">
                    <div>
                        <h1 class="text-lg font-black text-orange-600 tracking-tighter leading-none">SIER<span class="text-blue-600">QUIZ</span></h1>
                        <p class="text-[7px] font-black text-green-600 uppercase tracking-widest mt-1 leading-none">VALIDADO SOB PRESSÃO COGNITIVA</p>
                    </div>
                    <div class="text-right text-[9px] text-slate-400 font-bold" id="data-hoje"></div>
                </div>

                <div class="text-center mb-2 mt-4">
                    <p class="text-[7px] text-blue-500 font-black uppercase tracking-widest mb-1 leading-none">Análise de Perfil e Estratégia</p>
                    <h2 id="titulo-perfil" class="text-xl font-black text-slate-800 uppercase leading-none tracking-tighter"></h2>
                    <p id="subtitulo-perfil" class="text-[10px] text-slate-400 font-bold italic"></p>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-slate-50/50 p-2 rounded-lg border border-slate-100">
                        <div class="flex justify-between text-[8px] font-black uppercase text-slate-400"><span>Razão (QI)</span><span id="val-qi" class="text-blue-600">0</span></div>
                        <div class="barra-fundo"><div id="barra-qi" class="barra-fill bg-blue-600"></div></div>
                    </div>
                    <div class="bg-slate-50/50 p-2 rounded-lg border border-slate-100">
                        <div class="flex justify-between text-[8px] font-black uppercase text-slate-400"><span>Emoção (QE)</span><span id="val-qe" class="text-orange-500">0</span></div>
                        <div class="barra-fundo"><div id="barra-qe" class="barra-fill bg-orange-500"></div></div>
                    </div>
                </div>

                <div class="space-y-3">
                    <div>
                        <h3 class="text-[8px] font-black text-slate-400 uppercase">Diagnóstico</h3>
                        <p id="txt-diag" class="text-[10px] leading-tight text-slate-600 text-justify"></p>
                    </div>
                    <div class="bg-blue-50/50 p-2 rounded-lg border-l-2 border-blue-400">
                        <h3 class="text-[8px] font-black text-blue-600 uppercase">Direção Estratégica</h3>
                        <p id="txt-estr" class="text-[10px] leading-tight text-slate-600"></p>
                    </div>
                    <div class="bg-orange-50/50 p-2 rounded-lg border-l-2 border-orange-400">
                        <h3 class="text-[8px] font-black text-orange-600 uppercase">Ponto Cego</h3>
                        <p id="txt-cego" class="text-[10px] font-bold italic text-slate-700"></p>
                    </div>
                </div>

                <div class="mt-4 pt-3 border-t border-slate-100 flex justify-between items-end">
                    <div class="flex flex-col">
                        <p class="text-[8px] font-black text-slate-300 uppercase mb-2 leading-none">ID: <span id="res-id" class="text-slate-400"></span></p>
                        <p class="text-[8px] font-bold text-slate-400 uppercase leading-none">Análise para:</p>
                        <p id="nome-cliente" class="text-xs font-black text-slate-900 uppercase tracking-tighter"></p>
                    </div>
                    <div class="text-right">
                        <div class="assinatura leading-none">Anderson Dias</div>
                        <p class="text-[6px] font-black text-slate-400 uppercase">Especialista Sier Growth</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="area-botoes">
            <button onclick="irParaZap()" class="w-full bg-green-600 text-white p-3.5 rounded-2xl shadow-xl flex flex-col items-center justify-center active:scale-95 transition-transform">
                <span class="text-[9px] font-bold opacity-80 uppercase leading-none mb-1">1. Tire o Print agora</span>
                <span class="text-sm font-black uppercase leading-none tracking-tight">2. Enviar para o Especialista</span>
            </button>
            <button onclick="reiniciarNovoTeste()" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest self-center py-1">
                🔄 Refazer Análise
            </button>
        </div>
    </div>

    <script>
        window.onload = function() {
            const p = new URLSearchParams(window.location.search);
            const nome = p.get('nome') || "Líder";
            const qi = parseInt(p.get('qi')) || 0;
            const qe = parseInt(p.get('qe')) || 0;
            const txid = p.get('txid') || "6AEFAF"+Math.random().toString(36).substr(2, 6).toUpperCase();

            document.getElementById('res-id').innerText = txid;
            document.getElementById('data-hoje').innerText = new Date().toLocaleDateString();
            document.getElementById('nome-cliente').innerText = nome;
            document.getElementById('val-qi').innerText = qi;
            document.getElementById('val-qe').innerText = qe;

            let t, s, d, r, c;
            if(qi >= 8 && qe >= 8) { t="Visionário Alfa"; s="Alta Performance Híbrida"; d="Equilíbrio raro entre lógica e empatia."; r="Foque em escala e visão de futuro."; c="Cuidado para não centralizar demais a operação."; }
            else if(qi >= 7) { t="Estrategista Técnico"; s="Lógica e Processos"; d="Sua mente é movida por eficiência e dados."; r="Delegue o operacional e foque no produto."; c="A impaciência com ritmos lentos pode desgastar o time."; }
            else if(qe >= 7) { t="Líder Influenciador"; s="Conexão e Engajamento"; d="Sua força está em mover pessoas e criar redes de confiança."; r="Ancore suas decisões em números reais."; c="Cuidado com a gestão financeira e métricas de lucro real."; }
            else { t="Perfil em Transição"; s="Reestruturação Mental"; d="Fase de busca por novos métodos e clareza."; r="Escolha uma habilidade para dominar agora."; c="Falta de foco claro. Termine o que começou."; }

            document.getElementById('titulo-perfil').innerText = t;
            document.getElementById('subtitulo-perfil').innerText = s;
            document.getElementById('txt-diag').innerText = d;
            document.getElementById('txt-estr').innerText = r;
            document.getElementById('txt-cego').innerText = c;

            setTimeout(() => {
                document.getElementById('barra-qi').style.width = (qi*10)+'%';
                document.getElementById('barra-qe').style.width = (qe*10)+'%';
            }, 300);
        };

        function irParaZap() {
            const msg = encodeURIComponent(`Olá! Concluí o SierQuiz. Segue o print do meu resultado para análise!`);
            window.location.href = `https://wa.me/5571984420194?text=${msg}`;
        }

        function reiniciarNovoTeste() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'index-teste.html'; 
        }
    </script>
</body>
</html>
